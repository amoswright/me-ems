<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="ECG findings in hyperkalemia">
  <defs>
    <!-- Fine ECG Grid Pattern (1mm squares) -->
    <pattern id="fineGrid" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#fff"/>
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#e8b4b8" stroke-width="0.5"/>
    </pattern>
    <!-- Bold ECG Grid Pattern (5mm squares) -->
    <pattern id="boldGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="url(#fineGrid)"/>
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d88a8f" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Panel 1: Peaked T-Wave (tall and symmetric) -->
  <g id="panel1">
    <!-- Grid background -->
    <rect x="5" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Peaked T-Wave -->
    <path d="M 15,65
             L 25,65
             L 28,62
             L 32,65
             L 35,40
             L 38,72
             L 42,65
             L 48,65
             L 52,65
             L 56,65
             L 60,25
             L 64,65
             L 68,65
             L 75,65
             L 78,62
             L 82,65
             L 85,40
             L 88,72
             L 92,65
             L 98,65
             L 102,65
             L 106,65
             L 110,25
             L 114,65
             L 118,65
             L 125,65
             L 128,62
             L 132,65
             L 135,40
             L 138,72
             L 142,65
             L 148,65
             L 152,65
             L 156,65
             L 160,25
             L 164,65
             L 168,65
             L 175,65
             L 178,62
             L 182,65
             L 185,40"
          fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Yellow label box -->
    <rect x="5" y="130" width="190" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
    <text x="100" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Peaked T-Wave</text>
    <text x="100" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#000">(tall and symmetric)</text>
  </g>

  <!-- Panel 2: Widened QRS -->
  <g id="panel2">
    <!-- Grid background -->
    <rect x="205" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Widened QRS - broader QRS complexes -->
    <path d="M 215,65
             L 225,65
             L 229,63
             L 234,42
             L 239,65
             L 243,70
             L 247,65
             L 253,65
             L 257,65
             L 263,65
             L 268,35
             L 272,65
             L 278,65
             L 285,65
             L 289,63
             L 294,42
             L 299,65
             L 303,70
             L 307,65
             L 313,65
             L 317,65
             L 323,65
             L 328,35
             L 332,65
             L 338,65
             L 345,65
             L 349,63
             L 354,42
             L 359,65
             L 363,70
             L 367,65
             L 373,65
             L 377,65
             L 383,65"
          fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Yellow label box -->
    <rect x="205" y="130" width="190" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
    <text x="300" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Widened QRS</text>
  </g>

  <!-- Panel 3: Widened QRS and lengthened QT interval -->
  <g id="panel3">
    <!-- Grid background -->
    <rect x="405" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Widened QRS with lengthened QT - broader QRS + longer T wave -->
    <path d="M 415,65
             L 425,65
             L 429,63
             L 435,42
             L 441,65
             L 445,70
             L 450,65
             L 458,65
             L 464,65
             L 470,62
             L 475,38
             L 480,65
             L 488,65
             L 495,65
             L 499,63
             L 505,42
             L 511,65
             L 515,70
             L 520,65
             L 528,65
             L 534,65
             L 540,62
             L 545,38
             L 550,65
             L 558,65
             L 565,65
             L 569,63
             L 575,42
             L 581,65
             L 585,70"
          fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Yellow label box -->
    <rect x="405" y="130" width="190" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
    <text x="500" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000">Widened QRS and</text>
    <text x="500" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000">lengthened QT interval</text>
  </g>

  <!-- Panel 4: Sine wave pattern (severe hyperkalemia) -->
  <g id="panel4">
    <!-- Grid background -->
    <rect x="605" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Sine wave - smooth undulating pattern -->
    <path d="M 615,65
             Q 625,45 635,65
             Q 645,85 655,65
             Q 665,45 675,65
             Q 685,85 695,65
             Q 705,45 715,65
             Q 725,85 735,65
             Q 745,45 755,65
             Q 765,85 775,65
             Q 785,45 790,65"
          fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Yellow label box -->
    <rect x="605" y="130" width="190" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
    <text x="700" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Sine wave pattern</text>
    <text x="700" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#000">(severe)</text>
  </g>
</svg>
