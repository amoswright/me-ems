             L 144,65
             L 146,40
             L 148,68
             L 150,65
             L 162,65
             L 164,64
             L 166,63
             L 170,20
             L 174,63
             L 176,64
             L 178,65
             L 190,65"
          fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="5" y="130" width="190" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
    <text x="100" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Peaked T-Wave</text>
    <text x="100" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000">(tall and symmetric)</text>
  </g>

  <!-- Panel 2: Widened QRS - traced from original -->
  <g id="panel2">
    <rect x="205" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- Exact trace of Panel 2 waveform -->
    <path d="M 215,65
             L 230,65
             L 232,64
             L 236,43
             L 240,65
             L 244,69
             L 248,65
             L 260,65
