  </g>

  <!-- Panel 4: Widened QRS and lengthened QT (second example) - traced from original -->
  <g id="panel4">
    <rect x="605" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- Exact trace of Panel 4 waveform -->
    <path d="M 615,65
