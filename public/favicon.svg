<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#DC2626" stroke="#B91C1C" stroke-width="2"/>

  <!-- Ambulance body -->
  <rect x="25" y="40" width="50" height="30" rx="3" fill="white"/>

  <!-- Windshield -->
  <rect x="25" y="40" width="15" height="12" fill="#60A5FA"/>

  <!-- Emergency lights -->
  <circle cx="32" cy="36" r="3" fill="#FEF08A"/>
  <circle cx="68" cy="36" r="3" fill="#FEF08A"/>

  <!-- Medical cross -->
  <rect x="54" y="48" width="12" height="4" fill="#DC2626"/>
  <rect x="58" y="44" width="4" height="12" fill="#DC2626"/>

  <!-- Wheels -->
  <circle cx="35" cy="70" r="6" fill="#1F2937" stroke="#111827" stroke-width="1"/>
  <circle cx="35" cy="70" r="3" fill="#6B7280"/>
  <circle cx="65" cy="70" r="6" fill="#1F2937" stroke="#111827" stroke-width="1"/>
  <circle cx="65" cy="70" r="3" fill="#6B7280"/>
</svg>
