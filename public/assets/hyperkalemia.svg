<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="ECG findings in hyperkalemia">
  <defs>
    <!-- Fine ECG Grid Pattern (1mm squares) -->
    <pattern id="fineGrid" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#fff"/>
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#e8b4b8" stroke-width="0.5"/>
    </pattern>
    <!-- Bold ECG Grid Pattern (5mm squares) -->
    <pattern id="boldGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="url(#fineGrid)"/>
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d88a8f" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Panel 1: Peaked T-Wave -->
  <g id="panel1">
    <!-- Grid background -->
    <rect x="5" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Normal QRS with peaked T-waves -->
    <path d="M 15,65
             L 25,65
             L 28,62
             L 32,65
             L 35,42
             L 38,72
             L 42,65
             L 48,65
             L 52,65
             L 56,65
             L 60,25
             L 64,65
             L 68,65
             L 75,65
             L 78,62
             L 82,65
             L 85,42
             L 88,72
             L 92,65
             L 98,65
             L 102,65
             L 106,65
             L 110,25
             L 114,65
             L 118,65
             L 125,65
             L 128,62
             L 132,65
             L 135,42
             L 138,72
             L 142,65
             L 148,65
             L 152,65
             L 156,65
             L 160,25
             L 164,65
             L 168,65
             L 175,65
             L 178,62
             L 182,65
             L 185,42"
          fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Yellow label box -->
    <rect x="5" y="130" width="190" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
    <text x="100" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Peaked T-Wave</text>
    <text x="100" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000">(tall and symmetric)</text>
  </g>

  <!-- Panel 2: Widened QRS -->
  <g id="panel2">
    <!-- Grid background -->
    <rect x="205" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Widened QRS complexes -->
    <path d="M 215,65
             L 225,65
             L 228,63
             L 233,42
             L 238,65
             L 242,70
             L 246,65
             L 252,65
             L 256,65
             L 262,65
             L 267,35
             L 271,65
             L 277,65
             L 285,65
             L 288,63
             L 293,42
             L 298,65
             L 302,70
             L 306,65
             L 312,65
             L 316,65
             L 322,65
             L 327,35
             L 331,65
             L 337,65
             L 345,65
             L 348,63
             L 353,42
             L 358,65
             L 362,70
             L 366,65
             L 372,65
             L 376,65
             L 382,65
             L 387,35"
          fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Yellow label box -->
    <rect x="205" y="130" width="190" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
    <text x="300" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Widened QRS</text>
  </g>

  <!-- Panel 3: Widened QRS and lengthened QT (first example) -->
  <g id="panel3">
    <!-- Grid background -->
    <rect x="405" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Even wider QRS with longer QT interval -->
    <path d="M 415,65
             L 425,65
             L 428,63
             L 434,40
             L 440,65
             L 445,72
             L 450,65
             L 458,65
             L 464,65
             L 470,62
             L 475,38
             L 480,65
             L 488,65
             L 495,65
             L 498,63
             L 504,40
             L 510,65
             L 515,72
             L 520,65
             L 528,65
             L 534,65
             L 540,62
             L 545,38
             L 550,65
             L 558,65
             L 565,65
             L 568,63
             L 574,40
             L 580,65
             L 585,72"
          fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Panel 4: Widened QRS and lengthened QT (second example) -->
  <g id="panel4">
    <!-- Grid background -->
    <rect x="605" y="5" width="190" height="120" fill="url(#boldGrid)" stroke="#333" stroke-width="2"/>

    <!-- ECG Waveform: Progressive widening with bizarre morphology -->
    <path d="M 615,65
             L 625,65
             L 628,63
             L 635,35
             L 642,65
             L 648,75
             L 655,65
             L 663,65
             L 670,62
             L 675,40
             L 680,65
             L 688,65
             L 695,65
             L 698,63
             L 705,35
             L 712,65
             L 718,75
             L 725,65
             L 733,65
             L 740,62
             L 745,40
             L 750,65
             L 758,65
             L 765,65
             L 768,63
             L 775,35
             L 782,65
             L 788,75"
          fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Single yellow label box spanning panels 3 and 4 -->
  <rect x="405" y="130" width="390" height="40" fill="#F4C430" stroke="#000" stroke-width="1.5"/>
  <text x="600" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Widened QRS and lengthened QT</text>
  <text x="600" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">interval</text>
</svg>
